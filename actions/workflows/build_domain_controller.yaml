version: 1.0

description: Domain Controller deployment workflow

input:
  - name

tasks:
  cleanup_git_repo:
    action: core.local
    input:
      cmd: "if [ -d /stackstorm/nightlight-lab ]; then sudo rm -rf /stackstorm/nightlight-lab; fi"
    next:
      - when: <% succeeded() %>
        do: clone_build_repo

  clone_build_repo:
    action: git.clone
    input:
      source: https://github.com/martezr/nightlight-lab.git
      destination: /stackstorm/nightlight-lab
      hosts: localhost
      ref: main
    next:
      - when: <% succeeded() %>
        do: provision_domain_controller_terraform_init

  provision_domain_controller_terraform_init:
    action: terraform.init
    input:
      #variable_files: ["/stackstorm/vsphere.auto.tfvars"]
      plan_path: /stackstorm/nightlight-lab/terraform/domain_controller
      backend: {"path":"/tmp/terraform.tfstate"}
      env: {"TF_CLI_CONFIG_FILE":"/home/stanley/.terraformrc"}
    next:
      - when: <% succeeded() %>
        do: provision_domain_controller_terraform_plan

  provision_domain_controller_terraform_plan:
    action: terraform.plan
    input:
      #variable_files: ["/stackstorm/vsphere.auto.tfvars"]
      plan_path: /stackstorm/nightlight-lab/terraform/domain_controller
      env: {"TF_CLI_CONFIG_FILE":"/home/stanley/.terraformrc"}
    next:
      - when: <% succeeded() %>
        do: provision_domain_controller_terraform_apply

  provision_domain_controller_terraform_apply:
    action: terraform.apply
    input:
      #variable_files: ["/stackstorm/vsphere.auto.tfvars"]
      plan_path: /stackstorm/nightlight-lab/terraform/domain_controller
      env: {"TF_CLI_CONFIG_FILE":"/home/stanley/.terraformrc"}
    next:
      - when: <% succeeded() %>
        do: output_domain_controller_info

  output_domain_controller_info:
    action: terraform.output
    input:
      plan_path: /stackstorm/nightlight-lab/terraform/domain_controller
      env: {"TF_CLI_CONFIG_FILE":"/home/stanley/.terraformrc"}
    next:
      - when: <% succeeded() %>
        do: rename_computer
        publish:
          - ip_address: <% result().result.primary_ip_address.value %>

  rename_computer:
    action: core.winrm_ps_cmd
    input:
      cmd: 'Rename-Computer -NewName "windc01" -Force -Restart'
      host: <% ctx().ip_address %>
      scheme: http
      timeout: 600
      port: 5985
      username: administrator
      password: Password123#
      transport: ntlm
      verify_ssl_cert: false
    next:
      - when: <% succeeded() %>
        do: wait_for_reboot

  wait_for_reboot:
    action: core.pause
    input:
      max_pause: 60
    next:
      - when: <% succeeded() %>
        do: bootstrap_salt_minion

  bootstrap_salt_minion:
    action: core.winrm_ps_cmd
    input:
      cmd: |
        [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.SecurityProtocolType]'Tls12';
        Invoke-WebRequest -Uri https://github.com/saltstack/salt-bootstrap/releases/latest/download/bootstrap-salt.ps1 -OutFile "$env:TEMP\bootstrap-salt.ps1";
        Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force; & "$env:TEMP\bootstrap-salt.ps1" -Master 192.168.128.103 -Minion windc01
      host: <% ctx().ip_address %>
      scheme: http
      timeout: 600
      port: 5985
      username: administrator
      password: Password123#
      transport: ntlm
      verify_ssl_cert: false
    next:
      - when: <% succeeded() %>
        do: configure_domain_controller

  configure_domain_controller:
    action: salt.local_state.sls
    input:
      target: windc01
      args: [ad_dc]
      timeout: 900
