version: 1.0

description: A basic workflow that runs an arbitrary linux command.

input:
  - name

tasks:
  cleanup_git_repo:
    action: core.local
    input:
      cmd: "[ -d /tmp/nightlight-lab ] && sudo rm -rf /tmp/nightlight-lab || true"
    next:
      - when: <% succeeded() %>
        do: clone_build_repo

  clone_build_repo:
    action: git.clone
    input:
      source: https://github.com/martezr/nightlight-lab.git
      destination: /tmp/nightlight-lab
      hosts: localhost
    next:
      - when: <% succeeded() %>
        do: provision_domain_controller

  provision_domain_controller:
    action: terraform.pipeline
    input:
      #variable_files: ["/stackstorm/vsphere.auto.tfvars"]
      plan_path: /tmp/nightlight-lab/terraform/demo
      backend: {"path":"/tmp/terraform.tfstate"}
    # next:
